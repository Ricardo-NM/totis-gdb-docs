site_name: TotisGdB
site_description: Documentación técnica pública de TotisGdB sin código fuente.
site_author: TotisGdB

theme:
  name: material
  language: es
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: lime
      accent: lime

extra_css:
  - stylesheets/extra.css

nav:
  - Inicio: index.md
  - Arquitectura: arquitectura.md
  - Tecnologías: tecnologias.md
  - Módulos: modulos.md
  - Flujos: flujos.md
  - Seguridad: seguridad.md
  - Metodología: metodologia.md
  - Privacidad: privacidad.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
